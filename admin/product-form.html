<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sản phẩm - VƯƠN Admin</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>body{background:#f3f4f6;} .admin-layout{display:flex;min-height:100vh;} .main-panel{flex:1;padding:2rem;overflow-x:hidden;} .form-grid{display:grid;grid-template-columns:2fr 1fr;gap:1.5rem;} @media(max-width:768px){.form-grid{grid-template-columns:1fr;}} </style>
</head>
<body>
  <div class="admin-layout">
    <div id="admin-sidebar"></div>
    <div class="main-panel">
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;">
        <a href="products.html" style="color:#6b7280;text-decoration:none;font-size:1.25rem;">‹</a>
        <h1 id="form-title" style="font-size:1.5rem;font-weight:800;">Thêm sản phẩm</h1>
      </div>

      <div class="form-grid">
        <!-- Left: main info -->
        <div>
          <div class="card card-pad" style="margin-bottom:1rem;">
            <h2 style="font-weight:700;margin-bottom:1rem;">Thông tin cơ bản</h2>
            <div class="form-group">
              <label>Tên sản phẩm *</label>
              <input type="text" id="f-name" class="form-control" placeholder="VD: Bộ kit trồng cà chua bi">
            </div>
            <div class="form-group">
              <label>Mô tả ngắn</label>
              <textarea id="f-desc" class="form-control" rows="3" placeholder="Mô tả sản phẩm..."></textarea>
            </div>
            <div class="form-group">
              <label>Mô tả chi tiết</label>
              <textarea id="f-detail" class="form-control" rows="5" placeholder="Nội dung đầy đủ..."></textarea>
            </div>
          </div>

          <div class="card card-pad" style="margin-bottom:1rem;">
            <h2 style="font-weight:700;margin-bottom:1rem;">Giá & Kho hàng</h2>
            <div class="grid-2" style="gap:.75rem;">
              <div class="form-group" style="margin:0;">
                <label>Giá bán (VNĐ) *</label>
                <input type="number" id="f-price" class="form-control" placeholder="0">
              </div>
              <div class="form-group" style="margin:0;">
                <label>Giá gốc (VNĐ)</label>
                <input type="number" id="f-original-price" class="form-control" placeholder="0">
              </div>
              <div class="form-group" style="margin:0;">
                <label>Số lượng tồn kho *</label>
                <input type="number" id="f-stock" class="form-control" placeholder="0">
              </div>
              <div class="form-group" style="margin:0;">
                <label>SKU</label>
                <input type="text" id="f-sku" class="form-control" placeholder="VD: VN-TOM-001">
              </div>
            </div>
          </div>
        </div>

        <!-- Right: meta -->
        <div>
          <div class="card card-pad" style="margin-bottom:1rem;">
            <h2 style="font-weight:700;margin-bottom:1rem;">Phân loại</h2>
            <div class="form-group">
              <label>Danh mục *</label>
              <select id="f-category" class="form-control">
                <option value="vegetable">Rau củ</option>
                <option value="flower">Hoa cảnh</option>
                <option value="seeds">Hạt giống</option>
                <option value="combo">Combo</option>
                <option value="accessory">Phụ kiện</option>
              </select>
            </div>
            <div class="form-group">
              <label>Độ khó</label>
              <select id="f-difficulty" class="form-control">
                <option>Dễ</option>
                <option>Trung bình</option>
                <option>Khó</option>
              </select>
            </div>
            <div class="form-group">
              <label>Mức chăm sóc</label>
              <input type="text" id="f-care" class="form-control" placeholder="VD: Tưới 2 lần/ngày">
            </div>
            <div class="form-group">
              <label>Ánh sáng</label>
              <input type="text" id="f-light" class="form-control" placeholder="VD: Nhiều ánh sáng">
            </div>
            <div class="form-group" style="display:flex;align-items:center;gap:.5rem;margin:0;">
              <input type="checkbox" id="f-instock" checked style="width:18px;height:18px;">
              <label for="f-instock" style="margin:0;cursor:pointer;">Còn hàng</label>
            </div>
          </div>

          <div class="card card-pad" style="margin-bottom:1rem;">
            <h2 style="font-weight:700;margin-bottom:1rem;">Hình ảnh</h2>
            <div class="form-group">
              <label>Tải ảnh từ máy</label>
              <input type="file" id="f-image-file" accept="image/*" class="form-control" onchange="onPickImage(event)">
              <p style="font-size:.75rem;color:#9ca3af;margin-top:.25rem;">Ảnh sẽ tự động được nén nhẹ trước khi lưu.</p>
            </div>
            <div class="form-group">
              <label>Hoặc dán URL ảnh</label>
              <input type="url" id="f-image" class="form-control" placeholder="https://...">
            </div>
            <div id="img-preview" style="display:none;margin-top:.5rem;">
              <img id="preview-img" style="width:100%;border-radius:.5rem;max-height:180px;object-fit:cover;">
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:.5rem;">
            <button onclick="saveProduct(event)" class="btn btn-green">💾 Lưu sản phẩm</button>
            <a href="products.html" class="btn btn-outline" style="text-align:center;">Hủy</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../assets/common.js"></script>
  <script>
    renderAdminSidebar();
    const editId = getParam('id');

    // Difficulty enum của backend dùng dấu gạch dưới (Trung_bình) → đổi sang nhãn hiển thị
    const diffLabel = d => (d === 'Trung_bình' ? 'Trung bình' : (d || 'Dễ'));

    async function loadProduct() {
      if(!editId) return;
      document.getElementById('form-title').textContent = 'Chỉnh sửa sản phẩm';
      const { product } = await API.getProduct(editId);
      if(!product) { showToast('Không tải được sản phẩm','error'); return; }
      document.getElementById('f-name').value = product.name || '';
      document.getElementById('f-desc').value = product.description || '';
      document.getElementById('f-price').value = product.price || '';
      document.getElementById('f-original-price').value = product.originalPrice || '';
      document.getElementById('f-stock').value = product.stock || 0;
      if(product.category) document.getElementById('f-category').value = product.category;
      document.getElementById('f-difficulty').value = diffLabel(product.difficulty);
      document.getElementById('f-care').value = product.careLevel || '';
      document.getElementById('f-light').value = product.light || '';
      document.getElementById('f-sku').value = product.sku || '';
      document.getElementById('f-instock').checked = product.inStock !== false;
      document.getElementById('f-image').value = product.image || '';
      updatePreview();
    }
    loadProduct();

    document.getElementById('f-image').addEventListener('input', updatePreview);
    function updatePreview() {
      const url = document.getElementById('f-image').value;
      if(url) {
        document.getElementById('preview-img').src = url;
        document.getElementById('img-preview').style.display = 'block';
      } else {
        document.getElementById('img-preview').style.display = 'none';
      }
    }

    // Chọn ảnh từ máy → nén → đặt vào ô URL (data URL) + xem trước
    async function onPickImage(e) {
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      try {
        showToast('Đang xử lý ảnh...');
        const dataUrl = await compressImageFile(file, 1000, 0.72);
        document.getElementById('f-image').value = dataUrl;
        updatePreview();
      } catch(err) {
        showToast(err.message || 'Lỗi xử lý ảnh','error');
      }
    }

    async function saveProduct(event) {
      const name = document.getElementById('f-name').value.trim();
      const price = parseInt(document.getElementById('f-price').value);
      const stock = parseInt(document.getElementById('f-stock').value) || 0;
      if(!name) { showToast('Vui lòng nhập tên sản phẩm','error'); return; }
      if(!price || price <= 0) { showToast('Vui lòng nhập giá hợp lệ','error'); return; }

      const originalPrice = parseInt(document.getElementById('f-original-price').value) || 0;
      const body = {
        name,
        category: document.getElementById('f-category').value,
        price,
        originalPrice,
        stock,
        sku: document.getElementById('f-sku').value.trim(),
        description: document.getElementById('f-desc').value.trim(),
        difficulty: document.getElementById('f-difficulty').value,
        careLevel: document.getElementById('f-care').value.trim(),
        light: document.getElementById('f-light').value.trim(),
        image: document.getElementById('f-image').value.trim()
      };

      const btn = event && event.target;
      if(btn) { btn.disabled = true; btn.textContent = 'Đang lưu...'; }

      const r = editId
        ? await API.adminUpdateProduct(editId, body)
        : await API.adminCreateProduct(body);

      if(r.ok) {
        showToast(editId ? 'Đã cập nhật sản phẩm!' : 'Đã thêm sản phẩm mới!');
        setTimeout(() => location.href = 'products.html', 800);
      } else {
        showToast(r.error || 'Lưu thất bại', 'error');
        if(btn) { btn.disabled = false; btn.textContent = '💾 Lưu sản phẩm'; }
      }
    }
  </script>
</body>
</html>
