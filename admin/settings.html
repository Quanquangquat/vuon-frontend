<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cài đặt giao diện - VƯƠN Admin</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body{background:#f3f4f6;}
    .admin-layout{display:flex;min-height:100vh;}
    .main-panel{flex:1;padding:2rem;overflow-x:hidden;}
    .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
    @media(max-width:900px){.settings-grid{grid-template-columns:1fr;}}
    .img-prev{display:block;margin-top:.5rem;max-height:80px;border-radius:.5rem;border:1px solid #e5e7eb;background:#fff;}
  </style>
</head>
<body>
  <div class="admin-layout">
    <div id="admin-sidebar"></div>
    <div class="main-panel">
      <div style="margin-bottom:1.5rem;">
        <h1 style="font-size:1.5rem;font-weight:800;">Cài đặt giao diện</h1>
        <p style="color:#6b7280;font-size:.875rem;">Logo, favicon, thông tin & liên kết hiển thị trên toàn website. Lưu xong sẽ áp dụng cho mọi trang.</p>
      </div>

      <div class="settings-grid">
        <!-- Thương hiệu & hình ảnh -->
        <div class="card card-pad">
          <h2 style="font-weight:700;margin-bottom:1rem;">Thương hiệu & hình ảnh</h2>
          <div class="form-group">
            <label>Tên thương hiệu</label>
            <input type="text" id="s-brandName" class="form-control" placeholder="VƯƠN">
          </div>
          <div class="form-group">
            <label>Logo header (tải từ máy)</label>
            <input type="file" accept="image/*" class="form-control" onchange="pickImg(event,'logoUrl')">
            <img id="prev-logoUrl" class="img-prev" style="display:none;">
          </div>
          <div class="form-group">
            <label>Logo footer / nền tối (tải từ máy)</label>
            <input type="file" accept="image/*" class="form-control" onchange="pickImg(event,'logoWhiteUrl')">
            <img id="prev-logoWhiteUrl" class="img-prev" style="display:none;background:#111827;">
          </div>
          <div class="form-group">
            <label>Favicon (ảnh vuông nhỏ, tải từ máy)</label>
            <input type="file" accept="image/*" class="form-control" onchange="pickImg(event,'faviconUrl')">
            <img id="prev-faviconUrl" class="img-prev" style="display:none;max-height:48px;">
          </div>
          <div class="form-group">
            <label>Dòng khuyến mãi ở trang chủ (có thể dùng &lt;strong&gt;)</label>
            <input type="text" id="s-promoBarText" class="form-control" placeholder="VD: <strong>Khuyến mãi:</strong> Giảm 20%...">
          </div>
        </div>

        <!-- Thông tin & liên kết footer -->
        <div class="card card-pad">
          <h2 style="font-weight:700;margin-bottom:1rem;">Thông tin & liên kết (footer)</h2>
          <div class="form-group">
            <label>Mô tả ngắn</label>
            <textarea id="s-footerDescription" class="form-control" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Hotline / điện thoại</label>
            <input type="text" id="s-footerPhone" class="form-control" placeholder="1800 6789 (Miễn phí)">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="text" id="s-footerEmail" class="form-control" placeholder="vuonfarm@gmail.com">
          </div>
          <div class="form-group">
            <label>Địa chỉ (để trống nếu không hiển thị)</label>
            <input type="text" id="s-footerAddress" class="form-control">
          </div>
          <div class="form-group">
            <label>Link Facebook</label>
            <input type="text" id="s-facebookUrl" class="form-control" placeholder="https://facebook.com/...">
          </div>
          <div class="form-group">
            <label>Link Instagram</label>
            <input type="text" id="s-instagramUrl" class="form-control" placeholder="https://instagram.com/...">
          </div>
          <div class="form-group">
            <label>Link YouTube</label>
            <input type="text" id="s-youtubeUrl" class="form-control" placeholder="https://youtube.com/...">
          </div>
        </div>
      </div>

      <div style="margin-top:1.5rem;display:flex;gap:.75rem;">
        <button onclick="saveSettings(event)" class="btn btn-green">💾 Lưu cài đặt</button>
        <a href="../home.html" target="_blank" class="btn btn-outline">Xem trang chủ ↗</a>
      </div>
    </div>
  </div>
  <script src="../assets/common.js"></script>
  <script>
    renderAdminSidebar();

    const TEXT_FIELDS = ['brandName','promoBarText','footerDescription','footerPhone','footerEmail','footerAddress','facebookUrl','instagramUrl','youtubeUrl'];
    const IMG_FIELDS  = ['logoUrl','logoWhiteUrl','faviconUrl'];
    const imgData = { logoUrl:'', logoWhiteUrl:'', faviconUrl:'' };

    async function load() {
      const s = await API.getSettings();
      if(!s) return;
      TEXT_FIELDS.forEach(f => { const el = document.getElementById('s-'+f); if(el && s[f]!=null) el.value = s[f]; });
      IMG_FIELDS.forEach(f => {
        if(s[f]) { imgData[f] = s[f]; const img = document.getElementById('prev-'+f); img.src = s[f]; img.style.display='block'; }
      });
    }

    async function pickImg(e, field) {
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      try {
        showToast('Đang xử lý ảnh...');
        // favicon nén nhỏ hơn
        const dataUrl = await compressImageFile(file, field==='faviconUrl'?128:600, 0.8);
        imgData[field] = dataUrl;
        const img = document.getElementById('prev-'+field);
        img.src = dataUrl; img.style.display = 'block';
      } catch(err) { showToast(err.message || 'Lỗi ảnh','error'); }
    }

    async function saveSettings(event) {
      const body = {};
      TEXT_FIELDS.forEach(f => { body[f] = document.getElementById('s-'+f).value.trim(); });
      IMG_FIELDS.forEach(f => { if(imgData[f]) body[f] = imgData[f]; });

      const btn = event.target;
      btn.disabled = true; btn.textContent = 'Đang lưu...';
      const r = await API.adminUpdateSettings(body);
      if(r.ok) showToast('Đã lưu cài đặt! Tải lại trang để thấy thay đổi.');
      else showToast(r.error || 'Lưu thất bại','error');
      btn.disabled = false; btn.textContent = '💾 Lưu cài đặt';
    }

    load();
  </script>
</body>
</html>
