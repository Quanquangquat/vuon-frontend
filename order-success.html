<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt hàng thành công - VƯƠN</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>body{background:#f9fafb;}
    .qr-box{background:#fff;border:1px solid #e5e7eb;border-radius:.75rem;padding:1.25rem;margin-bottom:1.5rem;text-align:left;}
    .qr-row{display:flex;justify-content:space-between;gap:1rem;padding:.4rem 0;border-bottom:1px dashed #f0f0f0;font-size:.9rem;}
    .qr-row:last-child{border-bottom:none;}
    .qr-row b{color:#111;}
    .copy-btn{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;border-radius:.375rem;padding:.1rem .5rem;font-size:.75rem;cursor:pointer;}
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="text-align:center;max-width:460px;">
      <div style="width:80px;height:80px;background:#f0fdf4;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
        <svg width="48" height="48" fill="none" stroke="#16a34a" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:.5rem;">Đặt hàng thành công!</h1>
      <p style="color:#6b7280;margin-bottom:1.5rem;">Cảm ơn bạn đã đặt hàng. Chúng tôi sẽ liên hệ với bạn sớm nhất.</p>

      <div id="payment-block"></div>

      <div style="display:flex;flex-direction:column;gap:.75rem;">
        <a href="orders.html" class="btn btn-green">Xem đơn hàng</a>
        <a href="home.html" class="btn btn-gray">Tiếp tục mua sắm</a>
      </div>
    </div>
  </div>
  <script src="assets/common.js"></script>
  <script>
    // ===== CẤU HÌNH TÀI KHOẢN NHẬN CHUYỂN KHOẢN =====
    // Cách 1 (khuyên dùng): điền số TK + mã ngân hàng → tự sinh QR động đã kèm số tiền + nội dung.
    //   Danh sách mã ngân hàng: https://api.vietqr.io/v2/banks  (vd Vietcombank='VCB', MB='MB', Techcombank='TCB', BIDV='BIDV', TPBank='TPB', ACB='ACB')
    // Cách 2: để trống BANK_ACCOUNT và thả ảnh QR tĩnh của bạn vào assets/qr-chuyenkhoan.png
    const BANK_ACCOUNT = '';            // ví dụ '0123456789'
    const BANK_CODE    = 'VCB';         // mã ngân hàng theo VietQR
    const BANK_NAME    = 'Ngân hàng Vietcombank';
    const ACCOUNT_NAME = 'DU AN VUON'; // tên chủ tài khoản (không dấu)
    const STATIC_QR    = 'assets/qr-chuyenkhoan.png'; // ảnh QR tĩnh (dùng khi không điền BANK_ACCOUNT)
    // =================================================

    const last = JSON.parse(localStorage.getItem('vuon_last_order') || '{}');
    localStorage.removeItem('vuon_last_order');
    const block = document.getElementById('payment-block');

    if (last.payMethod === 'BANK') {
      const shortId = last.id ? String(last.id).substring(0,8).toUpperCase() : '';
      const content = 'VUON ' + shortId;            // nội dung chuyển khoản = mã đơn
      const amount  = Number(last.total || 0);

      // Nguồn ảnh QR: ưu tiên VietQR động nếu đã cấu hình số TK
      let qrSrc;
      if (BANK_ACCOUNT) {
        qrSrc = `https://img.vietqr.io/image/${BANK_CODE}-${BANK_ACCOUNT}-compact2.png`
              + `?amount=${amount}&addInfo=${encodeURIComponent(content)}`
              + `&accountName=${encodeURIComponent(ACCOUNT_NAME)}`;
      } else {
        qrSrc = STATIC_QR;
      }

      block.innerHTML = `
        <div class="qr-box">
          <h2 style="font-weight:700;margin-bottom:.75rem;text-align:center;">Quét mã để chuyển khoản</h2>
          <img src="${qrSrc}" alt="QR chuyển khoản" style="width:220px;max-width:100%;display:block;margin:0 auto .75rem;border-radius:.5rem;"
               onerror="this.style.display='none';document.getElementById('qr-fallback').style.display='block';">
          <p id="qr-fallback" style="display:none;color:#ef4444;font-size:.85rem;text-align:center;">Chưa có ảnh QR. Vui lòng chuyển khoản theo thông tin dưới đây.</p>
          <div class="qr-row"><span>Ngân hàng</span><b>${BANK_NAME}</b></div>
          ${BANK_ACCOUNT ? `<div class="qr-row"><span>Số tài khoản</span><b>${BANK_ACCOUNT} <button class="copy-btn" onclick="cp('${BANK_ACCOUNT}')">Copy</button></b></div>` : ''}
          <div class="qr-row"><span>Chủ tài khoản</span><b>${ACCOUNT_NAME}</b></div>
          <div class="qr-row"><span>Số tiền</span><b style="color:#16a34a;">${fmt(amount)}</b></div>
          <div class="qr-row"><span>Nội dung</span><b>${content} <button class="copy-btn" onclick="cp('${content}')">Copy</button></b></div>
          <p style="font-size:.8rem;color:#6b7280;margin-top:.75rem;">Vui lòng ghi đúng nội dung <b>${content}</b> để chúng tôi đối soát đơn của bạn.</p>
        </div>`;
    }

    function cp(t) {
      navigator.clipboard?.writeText(t).then(() => showToast('Đã sao chép: ' + t));
    }
  </script>
</body>
</html>
